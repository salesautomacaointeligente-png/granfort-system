<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1e40af">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GranfortSystem">
<link rel="manifest" href="manifest.json">
<title>GranfortSystem — Gestão de Marmoraria</title>
<style>
:root{
  --primary:#1e40af;--primary-dark:#1e3a8a;--primary-soft:#eff6ff;
  --success:#10b981;--danger:#ef4444;--warning:#f59e0b;--purple:#8b5cf6;
  --text:#0f172a;--text-soft:#64748b;--text-muted:#94a3b8;
  --border:#e2e8f0;--card:#fff;--bg:#f1f5f9;
  --sidebar-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;transition:transform .3s}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40}
.topbar-title{font-weight:700;font-size:16px;flex:1}
.topbar-actions{display:flex;gap:8px;align-items:center}
#content{padding:20px;flex:1}

/* Sidebar */
.brand{padding:16px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand-name{font-weight:800;font-size:16px;color:#fff}
.brand-sub{font-size:11px;color:#64748b;margin-top:2px}
.nav-section{padding:8px 12px 4px;font-size:10px;font-weight:700;color:#475569;letter-spacing:1.5px;text-transform:uppercase;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:rgba(30,64,175,.3);color:#93c5fd;border-left-color:#3b82f6}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:1.5px solid transparent;transition:all .15s;cursor:pointer}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:#fff;color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-ghost{color:var(--text-soft)}
.btn-ghost:hover{background:#f1f5f9;color:var(--text)}
.btn-purple{background:var(--purple);color:#fff}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.card-title{font-weight:700;font-size:14px;flex:1}
.card-body{padding:20px}
.card-body.no-pad{padding:0}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* KPI */
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px}
.kpi-label{font-size:12px;color:var(--text-soft);font-weight:500;margin-bottom:4px}
.kpi-value{font-size:24px;font-weight:800;color:var(--text)}

/* Table */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);white-space:nowrap}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f8fafc}
.tbl td.num{text-align:right}
.tbl th.num{text-align:right}
.tbl td.center{text-align:center}
.actions{display:flex;gap:4px;white-space:nowrap}

/* Form */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:5px}
.input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:border-color .15s;background:#fff}
.input:focus{border-color:var(--primary)}
.select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff}
.select:focus{border-color:var(--primary)}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:#dcfce7;color:#166534}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-warning{background:#fef9c3;color:#854d0e}
.badge-info{background:#dbeafe;color:#1e40af}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-gray{background:#f1f5f9;color:#475569}

/* Modal */
#modalRoot .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
#modalRoot .modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
#modalRoot .modal.lg{max-width:720px}
#modalRoot .modal.xl{max-width:900px}
#modalRoot .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
#modalRoot .modal-title{font-weight:700;font-size:16px;flex:1}
#modalRoot .modal-body{padding:20px;overflow-y:auto;flex:1}
#modalRoot .modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:6px}
.close-btn:hover{background:var(--bg)}

/* Toast */
#toastContainer{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;animation:slideIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.success{background:#10b981;color:#fff}
.toast.error{background:#ef4444;color:#fff}
.toast.warning{background:#f59e0b;color:#fff}
.toast.default{background:#1e293b;color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Utils */
.mb-sm{margin-bottom:8px}.mb-md{margin-bottom:16px}.mb-lg{margin-bottom:24px}
.mt-sm{margin-top:8px}.mt-md{margin-top:16px}
.flex{display:flex}.gap-sm{gap:8px}.gap-md{gap:16px}
.flex-between{justify-content:space-between}.items-center{align-items:center}
.text-soft{color:var(--text-soft)}.text-sm{font-size:12px}.fw-700{font-weight:700}
.empty{text-align:center;padding:60px 20px;color:var(--text-soft)}
.empty h3{font-size:16px;margin-bottom:8px}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pipeline */
.pipeline{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.pipeline-col{min-width:220px;background:#f8fafc;border-radius:12px;border:1px solid var(--border)}
.pipeline-col-header{padding:12px 14px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pipeline-col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:200px}
.pipeline-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:box-shadow .15s}
.pipeline-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.pipeline-card-title{font-weight:600;font-size:13px;margin-bottom:4px}
.pipeline-card-sub{font-size:11px;color:var(--text-soft)}

/* Kanban */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kanban-col{min-width:200px;background:#f8fafc;border-radius:12px;border:1px solid var(--border)}
.kanban-col-header{padding:10px 14px;font-weight:700;font-size:12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
.kanban-col-body{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:150px}
.kanban-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px}
.kanban-card-title{font-weight:600;margin-bottom:2px}

/* Mobile */
.menu-btn{display:none;padding:8px;border-radius:8px;background:none;border:1.5px solid var(--border)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:80vw;max-width:280px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .menu-btn{display:flex;align-items:center;justify-content:center}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .overlay-menu{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
  .overlay-menu.open{display:block}

  /* Conteúdo */
  #content{padding:12px}
  .topbar{padding:10px 12px}

  /* KPI 2 colunas no celular */
  .grid-4{grid-template-columns:1fr 1fr}

  /* Tabelas com scroll */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl td,.tbl th{white-space:nowrap}

  /* Botões maiores para toque */
  .btn{padding:10px 16px;font-size:14px;min-height:44px}
  .btn-sm{padding:8px 12px;font-size:13px;min-height:38px}

  /* Modal tela cheia no celular */
  #modalRoot .modal{max-width:100%;max-height:100%;height:100%;border-radius:0;margin:0}
  #modalRoot .overlay{padding:0;align-items:flex-end}
  #modalRoot .modal.lg,#modalRoot .modal.xl{max-width:100%}

  /* Pipeline e Kanban com scroll */
  .pipeline,.kanban{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
  .pipeline-col{min-width:260px}
  .kanban-col{min-width:240px}

  /* Card body padding menor */
  .card-body{padding:14px}
  .card-header{padding:12px 14px}

  /* KPI menor */
  .kpi{padding:12px}
  .kpi-value{font-size:20px}

  /* Input e select maiores para toque */
  .input,.select{padding:12px;font-size:16px;min-height:44px}

  /* Ações na tabela empilhadas */
  .actions{flex-direction:column;gap:4px}
}
</style>
</head>

<script>
/* ============================================================
   GRANFORTSYSTEM — Sistema de Gestão de Marmoraria
   Granfort Marmoraria | Posto da Mata - BA
   ============================================================ */

const SUPABASE_URL = 'https://oozhxbssyofjwkzxdcxy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vemh4YnNzeW9mandrenhkY3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MDU4NjQsImV4cCI6MjA5Njk4MTg2NH0.Gpl9VdJteWzsF_aYDi80GzjZV9q8OHQ1NiQH4l9nTUk';

const EMPRESA = { nome:'Granfort Marmoraria', cidade:'Posto da Mata', uf:'BA', raio_km:150 };

// ── Supabase ──────────────────────────────────────────────
const SB = {
  h(extra={}){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...extra}; },
  async req(method,path,body,extra={}){
    const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{method,headers:this.h(extra),body:body?JSON.stringify(body):undefined});
    if(!r.ok){const t=await r.text();throw new Error(t||r.status);}
    const t=await r.text();return t?JSON.parse(t):[];
  },
  get:(p)=>SB.req('GET',p),
  post:(p,b)=>SB.req('POST',p,b),
  patch:(p,b)=>SB.req('PATCH',p,b,{'Prefer':'return=minimal'}),
  del:(p)=>SB.req('DELETE',p,null,{'Prefer':'return=minimal'}),
  upsert:(p,b,conflict)=>SB.req('POST',`${p}?on_conflict=${conflict}`,Array.isArray(b)?b:[b],{'Prefer':'resolution=merge-duplicates,return=minimal'}),
};

// ── Utils ────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function hoje(){return new Date().toISOString().slice(0,10);}
function fmtDate(s){if(!s)return'—';return new Date(s+'T00:00').toLocaleDateString('pt-BR');}
function fmtMoney(v){return'R$ '+(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtNum(v,d=2){return(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:d});}

function toast(msg,type='default',dur=3500){
  const el=document.createElement('div');
  el.className='toast '+type;el.textContent=msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>el.remove(),dur);
}

function openModal({title,body,footer,size=''}){
  document.getElementById('modalRoot').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal ${size}">
        <div class="modal-header">
          <div class="modal-title">${title}</div>
          <button class="close-btn" onclick="closeModal()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">${body}</div>
        ${footer?`<div class="modal-footer">${footer}</div>`:''}
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

function setPage(title,actions=''){
  document.getElementById('pageTitle').textContent=title;
  document.getElementById('topbarActions').innerHTML=actions;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.getAttribute('onclick')===`nav('${currentPage}')`));
}

function toggleMenu(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlayMenu').classList.toggle('open');
}

// ── Roteamento ───────────────────────────────────────────
let currentPage='';
function nav(page){
  currentPage=page;
  if(window.innerWidth<=768){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlayMenu').classList.remove('open');
  }
  const pages={dashboard:pgDashboard,clientes:pgClientes,orcamentos:pgOrcamentos,pipeline:pgPipeline,
    os:pgOS,kanban:pgKanban,agenda:pgAgenda,chapas:pgChapas,materiais:pgMateriais,
    caixa:pgCaixa,financeiro:pgFinanceiro,relatorios:pgRelatorios,config:pgConfig};
  if(pages[page])pages[page]();
}

function renderTabelaClientes(data){
  if(!data.length)return`<div class="empty"><h3>Nenhum cliente cadastrado</h3></div>`;
  return`<div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>Nome</th><th>Telefone</th><th>Cidade</th><th>Tipo</th><th></th></tr></thead>
    <tbody>${data.map(c=>`<tr>
      <td><b>${c.nome}</b></td>
      <td>${c.telefone||'—'}</td>
      <td>${c.cidade||'—'}</td>
      <td><span class="badge badge-gray">${c.tipo||'Pessoa Física'}</span></td>
      <td class="actions">
        <button class="btn btn-sm btn-ghost" onclick="modalEditarCliente('${c.id}')">✏️</button>

      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function filtrarClientes(q,enc){
  const data=JSON.parse(decodeURIComponent(enc));
  const f=data.filter(c=>(c.nome||'').toLowerCase().includes(q.toLowerCase())||(c.telefone||'').includes(q));
  document.getElementById('listaClientes').innerHTML=renderTabelaClientes(f);
}

function calcularOrc(){
  const comp=Number(document.getElementById('orc_comp')?.value)||0;
  const larg=Number(document.getElementById('orc_larg')?.value)||0;
  const preco_m2=Number(document.getElementById('orc_preco_m2')?.value)||0;
  const area=comp*larg/10000;
  if(document.getElementById('orc_area'))document.getElementById('orc_area').value=fmtNum(area)+' m²';

  // Serviços
  const saia=document.getElementById('orc_saia')?.checked;
  const rodo=document.getElementById('orc_rodo')?.checked;
  const cuba=document.getElementById('orc_cuba_check')?.checked;
  const furos=Number(document.getElementById('orc_furos_qtd')?.value)||0;
  const deslocamento=Number(document.getElementById('orc_deslocamento')?.value)||0;

  // Instalação
  const inst_sel=document.getElementById('orc_instalacao')?.value;
  const wrap=document.getElementById('orc_inst_custom_wrap');
  if(wrap)wrap.style.display=inst_sel==='custom'?'block':'none';
  const inst=inst_sel==='custom'?Number(document.getElementById('orc_inst_custom')?.value)||0:Number(inst_sel)||0;

  const v_pedra=area*preco_m2;
  const v_saia=saia?(comp/100)*0.15*preco_m2:0;
  const v_rodo=rodo?(comp/100)*0.10*preco_m2:0;
  const v_cuba=cuba?280:0;
  const v_furos=furos*80;

  const total=v_pedra+v_saia+v_rodo+v_cuba+v_furos+inst+deslocamento;

  const resumo=document.getElementById('orc_resumo');
  if(resumo)resumo.innerHTML=[
    v_pedra?`<div>Pedra (${fmtNum(area)} m² × ${fmtMoney(preco_m2)}): <b>${fmtMoney(v_pedra)}</b></div>`:'',
    v_saia?`<div>Saia: <b>${fmtMoney(v_saia)}</b></div>`:'',
    v_rodo?`<div>Rodabanca: <b>${fmtMoney(v_rodo)}</b></div>`:'',
    v_cuba?`<div>Cuba: <b>${fmtMoney(v_cuba)}</b></div>`:'',
    v_furos?`<div>Furos (${furos}x): <b>${fmtMoney(v_furos)}</b></div>`:'',
    inst?`<div>Instalação: <b>${fmtMoney(inst)}</b></div>`:'',
    deslocamento?`<div>Deslocamento: <b>${fmtMoney(deslocamento)}</b></div>`:'',
  ].filter(Boolean).join('');

  const td=document.getElementById('orc_total_display');
  if(td)td.textContent='Total: '+fmtMoney(total);
  window._orc_calc={area,v_pedra,v_saia,v_rodo,v_cuba,v_furos,inst,deslocamento,total,preco_m2};
}

async function salvarOrcamento(){
  const cliente_id=document.getElementById('orc_cliente')?.value;
  if(!cliente_id){toast('Selecione o cliente','error');return;}
  const c=window._orc_calc||{};
  const mat_sel=document.getElementById('orc_material');
  const mat_txt=mat_sel?.options[mat_sel?.selectedIndex]?.text||'';
  const d={
    id:uid(),
    cliente_id,
    tipo_ambiente:document.getElementById('orc_ambiente')?.value,
    material:mat_txt,
    espessura:document.getElementById('orc_espessura')?.value,
    comprimento_cm:Number(document.getElementById('orc_comp')?.value)||0,
    largura_cm:Number(document.getElementById('orc_larg')?.value)||0,
    area_m2:c.area||0,
    preco_m2:c.preco_m2||0,
    tem_saia:document.getElementById('orc_saia')?.checked,
    tem_rodabanca:document.getElementById('orc_rodo')?.checked,
    tem_cuba:document.getElementById('orc_cuba_check')?.checked,
    qtd_furos:Number(document.getElementById('orc_furos_qtd')?.value)||0,
    valor_instalacao:c.inst||0,
    valor_deslocamento:c.deslocamento||0,
    valor_total:c.total||0,
    observacoes:document.getElementById('orc_obs')?.value,
    status:'aberto',
    numero:'ORC-'+Date.now().toString().slice(-5),
    created_at:new Date().toISOString(),
  };
  try{
    await SB.post('orcamentos',d);
    toast('Orçamento salvo!','success');closeModal();pgOrcamentos();
  }catch(e){toast('Erro: '+e.message,'error');}
}

async function pgOS(){
  setPage('Ordens de Serviço',`<button class="btn btn-primary btn-sm" onclick="modalNovaOS()">+ Nova OS</button>`);
  document.getElementById('content').innerHTML=`<div class="empty"><div class="spin"></div></div>`;
  try{
    const data=await SB.get('ordens_servico?select=*,clientes(nome)&order=created_at.desc');
    const badgeOS={medição:'badge-info',corte:'badge-warning',acabamento:'badge-purple',separação:'badge-warning',instalação:'badge-primary',finalizado:'badge-success',cancelado:'badge-danger'};
    document.getElementById('content').innerHTML=`
      <div class="card"><div class="card-body no-pad"><div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>OS</th><th>Cliente</th><th>Ambiente</th><th>Material</th><th>Status</th><th>Prazo</th><th></th></tr></thead>
        <tbody>${data.length?data.map(o=>`<tr>
          <td><b>${o.numero||'—'}</b></td>
          <td>${o.clientes?.nome||'—'}</td>
          <td>${o.tipo_ambiente||'—'}</td>
          <td>${o.material||'—'}</td>
          <td><span class="badge ${badgeOS[o.status]||'badge-gray'}">${o.status||'—'}</span></td>
          <td>${fmtDate(o.prazo_entrega)}</td>
          <td class="actions">
            <button class="btn btn-sm btn-ghost" onclick="avancarOS('${o.id}','${o.status}')">▶ Avançar</button>
          </td>
        </tr>`).join(''):`<tr><td colspan="7"><div class="empty">Nenhuma OS</div></td></tr>`}</tbody>
      </table></div></div></div>`;
  }catch(e){document.getElementById('content').innerHTML=`<div class="empty"><h3>${e.message}</h3></div>`;}
}

const ETAPAS_OS=['medição','corte','acabamento','separação','instalação','finalizado'];
async function avancarOS(id,status){
  const idx=ETAPAS_OS.indexOf(status);
  if(idx>=ETAPAS_OS.length-1){toast('OS já finalizada','warning');return;}
  const prox=ETAPAS_OS[idx+1];
  if(!confirm(`Avançar para "${prox}"?`))return;
  try{await SB.patch(`ordens_servico?id=eq.${id}`,{status:prox});toast('Status atualizado','success');pgOS();}
  catch(e){toast('Erro: '+e.message,'error');}
}

async function modalNovaOS(){
  let clientes=[];try{clientes=await SB.get('clientes?select=id,nome&order=nome.asc');}catch(e){}
  openModal({title:'Nova OS Manual',body:`
    <div class="field"><label>Cliente</label><select class="select" id="nos_cliente"><option value="">Selecione</option>${clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select></div>
    <div class="grid-2">
      <div class="field"><label>Ambiente</label><select class="select" id="nos_amb">${['Cozinha','Banheiro','Soleira','Escada','Outros'].map(a=>`<option>${a}</option>`).join('')}</select></div>
      <div class="field"><label>Material</label><input class="input" id="nos_mat" placeholder="Ex: Granito Preto São Gabriel"></div>
    </div>
    <div class="field"><label>Prazo de Entrega</label><input class="input" type="date" id="nos_prazo"></div>
    <div class="field"><label>Observações</label><textarea class="input" id="nos_obs" rows="2"></textarea></div>`,
    footer:`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarNovaOS()">Salvar</button>`
  });
}

async function salvarNovaOS(){
  const d={id:uid(),cliente_id:document.getElementById('nos_cliente').value||null,
    tipo_ambiente:document.getElementById('nos_amb').value,material:document.getElementById('nos_mat').value,
    prazo_entrega:document.getElementById('nos_prazo').value||null,observacoes:document.getElementById('nos_obs').value,
    status:'medição',numero:'OS-'+Date.now().toString().slice(-4),created_at:new Date().toISOString()};
  try{await SB.post('ordens_servico',d);toast('OS criada!','success');closeModal();pgOS();}
  catch(e){toast('Erro: '+e.message,'error');}
}

        <div class="kanban-col-body">

              <div class="kanban-card-title">${o.numero} — ${o.clientes?.nome||'—'}</div>

async function modalNovaChapa(){
  let mats=[];try{mats=await SB.get('materiais?select=id,nome&order=nome.asc').catch(()=>[]);}catch(e){}
  openModal({title:'Nova Chapa',body:`
    <div class="grid-2">
      <div class="field"><label>Número da Chapa</label><input class="input" id="ch_num" placeholder="001"></div>
      <div class="field"><label>Material</label>
        <input class="input" id="ch_mat" placeholder="Ex: Granito Preto São Gabriel" list="ch_mat_list">
        <datalist id="ch_mat_list">${mats.map(m=>`<option value="${m.nome}">`).join('')}</datalist>
      </div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Comprimento (cm)</label><input class="input" id="ch_comp" type="number" oninput="calcChapa()"></div>
      <div class="field"><label>Largura (cm)</label><input class="input" id="ch_larg" type="number" oninput="calcChapa()"></div>
    </div>
    <div class="field"><label>Área Total (m²)</label><input class="input" id="ch_area" readonly style="background:#f1f5f9;font-weight:700"></div>
    <div class="field"><label>Fornecedor</label><input class="input" id="ch_forn" placeholder="Nome do fornecedor"></div>
    <div class="field"><label>Custo (R$)</label><input class="input" id="ch_custo" type="number" placeholder="0.00"></div>`,
    footer:`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarChapa()">Salvar</button>`
  });
}

function calcChapa(){
  const c=Number(document.getElementById('ch_comp')?.value)||0;
  const l=Number(document.getElementById('ch_larg')?.value)||0;
  const a=c*l/10000;
  if(document.getElementById('ch_area'))document.getElementById('ch_area').value=fmtNum(a)+' m²';
}

async function salvarChapa(){
  const comp=Number(document.getElementById('ch_comp').value)||0;
  const larg=Number(document.getElementById('ch_larg').value)||0;
  const area=comp*larg/10000;
  const d={id:uid(),numero:document.getElementById('ch_num').value,material:document.getElementById('ch_mat').value,
    comp_cm:comp,larg_cm:larg,area_total_m2:area,area_disponivel_m2:area,
    fornecedor:document.getElementById('ch_forn').value,custo:Number(document.getElementById('ch_custo').value)||0,
    status:'disponível',created_at:new Date().toISOString()};
  if(!d.material){toast('Informe o material','error');return;}
  try{await SB.post('chapas',d);toast('Chapa cadastrada!','success');closeModal();pgChapas();}
  catch(e){toast('Erro: '+e.message,'error');}
}

async function pgMateriais(){
  setPage('Materiais & Peças',`<button class="btn btn-primary btn-sm" onclick="modalNovoMaterial()">+ Novo</button>`);
  document.getElementById('content').innerHTML=`<div class="empty"><div class="spin"></div></div>`;
  try{
    const data=await SB.get('materiais?select=*&order=tipo.asc,nome.asc');
    document.getElementById('content').innerHTML=`
      <div class="card"><div class="card-body no-pad"><div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Nome</th><th>Tipo</th><th class="num">Custo/m²</th><th class="num">Venda/m²</th><th class="num">Margem</th><th></th></tr></thead>
        <tbody>${data.length?data.map(m=>{
          const margem=m.preco_custo_m2?((m.preco_venda_m2-m.preco_custo_m2)/m.preco_custo_m2*100):0;
          return`<tr>
            <td><b>${m.nome}</b></td>
            <td><span class="badge badge-gray">${m.tipo||'pedra'}</span></td>
            <td class="num">${fmtMoney(m.preco_custo_m2)}</td>
            <td class="num">${fmtMoney(m.preco_venda_m2)}</td>
            <td class="num" style="color:var(--success)">${fmtNum(margem)}%</td>
            <td class="actions"><button class="btn btn-sm btn-ghost" onclick="editarMaterial('${m.id}')">✏️</button></td>
          </tr>`;}).join(''):`<tr><td colspan="6"><div class="empty">Nenhum material</div></td></tr>`}</tbody>
      </table></div></div></div>`;
  }catch(e){document.getElementById('content').innerHTML=`<div class="empty"><h3>${e.message}</h3></div>`;}
}

function modalNovoMaterial(id=null,d={}){
  openModal({title:id?'Editar Material':'Novo Material',body:`
    <div class="field"><label>Nome *</label><input class="input" id="mat_nome" value="${d.nome||''}" placeholder="Ex: Granito Preto São Gabriel"></div>
    <div class="grid-2">
      <div class="field"><label>Tipo</label>
        <select class="select" id="mat_tipo">
          ${['pedra','cuba','pia','torneira','acessório','serviço','insumo'].map(t=>`<option ${d.tipo===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Espessura</label>
        <select class="select" id="mat_esp">
          ${['2cm','3cm','4cm','—'].map(e=>`<option ${d.espessura===e?'selected':''}>${e}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Custo/m² (R$)</label><input class="input" id="mat_custo" type="number" value="${d.preco_custo_m2||''}" placeholder="0.00"></div>
      <div class="field"><label>Venda/m² (R$)</label><input class="input" id="mat_venda" type="number" value="${d.preco_venda_m2||''}" placeholder="0.00"></div>
    </div>
    <div class="field"><label>Observações</label><input class="input" id="mat_obs" value="${d.observacoes||''}"></div>`,
    footer:`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarMaterial('${id||''}')">Salvar</button>`
  });
}

async function editarMaterial(id){
  try{const [m]=await SB.get(`materiais?id=eq.${id}&select=*`);modalNovoMaterial(id,m);}
  catch(e){toast('Erro','error');}
}

async function salvarMaterial(id){
  const d={nome:document.getElementById('mat_nome').value.trim(),tipo:document.getElementById('mat_tipo').value,
    espessura:document.getElementById('mat_esp').value,preco_custo_m2:Number(document.getElementById('mat_custo').value)||0,
    preco_venda_m2:Number(document.getElementById('mat_venda').value)||0,observacoes:document.getElementById('mat_obs').value};
  if(!d.nome){toast('Nome obrigatório','error');return;}
  try{
    if(id){await SB.patch(`materiais?id=eq.${id}`,d);}
    else{d.id=uid();d.created_at=new Date().toISOString();await SB.post('materiais',d);}
    toast('Salvo!','success');closeModal();pgMateriais();
  }catch(e){toast('Erro: '+e.message,'error');}
}

// FINANCEIRO
// ══════════════════════════════════════════════════════════
async function pgFinanceiro(){
  setPage('Contas & Fluxo',`<button class="btn btn-primary btn-sm" onclick="modalLancamento()">+ Lançamento</button>`);
  document.getElementById('content').innerHTML=`<div class="empty"><div class="spin"></div></div>`;
  try{
    const data=await SB.get('financeiro?select=*,clientes(nome)&order=data_vencimento.asc&limit=200');
    const rec=data.filter(d=>d.tipo==='receber');
    const pag=data.filter(d=>d.tipo==='pagar');
    const tot_rec=rec.reduce((s,d)=>s+(Number(d.valor)||0),0);
    const tot_pag=pag.reduce((s,d)=>s+(Number(d.valor)||0),0);
    document.getElementById('content').innerHTML=`
      <div class="grid-3 mb-md">
        <div class="kpi"><div class="kpi-label">A Receber</div><div class="kpi-value" style="color:var(--success)">${fmtMoney(tot_rec)}</div></div>
        <div class="kpi"><div class="kpi-label">A Pagar</div><div class="kpi-value" style="color:var(--danger)">${fmtMoney(tot_pag)}</div></div>
        <div class="kpi"><div class="kpi-label">Saldo</div><div class="kpi-value" style="color:${tot_rec-tot_pag>=0?'var(--success)':'var(--danger)'}">${fmtMoney(tot_rec-tot_pag)}</div></div>
      </div>
      <div class="card"><div class="card-body no-pad"><div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Descrição</th><th>Tipo</th><th>Cliente/Forn.</th><th>Vencimento</th><th class="num">Valor</th><th>Status</th><th></th></tr></thead>
        <tbody>${data.length?data.map(d=>`<tr>
          <td>${d.descricao||'—'}</td>
          <td><span class="badge ${d.tipo==='receber'?'badge-success':'badge-danger'}">${d.tipo}</span></td>
          <td>${d.clientes?.nome||d.fornecedor||'—'}</td>
          <td>${fmtDate(d.data_vencimento)}</td>
          <td class="num"><b>${fmtMoney(d.valor)}</b></td>
          <td><span class="badge ${d.pago?'badge-success':'badge-warning'}">${d.pago?'Pago':'Pendente'}</span></td>
          <td class="actions">
            ${!d.pago?`<button class="btn btn-sm btn-success" onclick="baixarLancamento('${d.id}')">✓ Baixar</button>`:''}
            <button class="btn btn-sm btn-danger" onclick="excluirLancamento('${d.id}')">🗑️</button>
          </td>
        </tr>`).join(''):`<tr><td colspan="7"><div class="empty">Nenhum lançamento</div></td></tr>`}</tbody>
      </table></div></div></div>`;
  }catch(e){document.getElementById('content').innerHTML=`<div class="empty"><h3>${e.message}</h3></div>`;}
}

async function salvarLancamento(){

async function baixarLancamento(id){
  if(!confirm('Marcar como pago?'))return;
  try{await SB.patch(`financeiro?id=eq.${id}`,{pago:true,data_pagamento:hoje()});toast('Baixado!','success');pgFinanceiro();}
  catch(e){toast('Erro: '+e.message,'error');}
}

async function excluirLancamento(id){
  if(!confirm('Excluir lançamento?'))return;
  try{await SB.del(`financeiro?id=eq.${id}`);toast('Excluído','success');pgFinanceiro();}
  catch(e){toast('Erro: '+e.message,'error');}
}

// ══════════════════════════════════════════════════════════
// FECHAMENTO DE CAIXA
// ══════════════════════════════════════════════════════════
async function pgCaixa(){
  setPage('Fechamento de Caixa','');
  const d=hoje();
  document.getElementById('content').innerHTML=`<div class="empty"><div class="spin"></div></div>`;
  try{
    const mov=await SB.get(`financeiro?select=*,clientes(nome)&data_pagamento=eq.${d}&pago=eq.true`);
    const entradas=mov.filter(m=>m.tipo==='receber').reduce((s,m)=>s+(Number(m.valor)||0),0);
    const saidas=mov.filter(m=>m.tipo==='pagar').reduce((s,m)=>s+(Number(m.valor)||0),0);
    document.getElementById('content').innerHTML=`
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">Fechamento do dia: <b>${fmtDate(d)}</b></div>
      <div class="grid-3 mb-md">
        <div class="kpi"><div class="kpi-label">Entradas</div><div class="kpi-value" style="color:var(--success)">${fmtMoney(entradas)}</div></div>
        <div class="kpi"><div class="kpi-label">Saídas</div><div class="kpi-value" style="color:var(--danger)">${fmtMoney(saidas)}</div></div>
        <div class="kpi"><div class="kpi-label">Saldo do Dia</div><div class="kpi-value" style="color:${entradas-saidas>=0?'var(--success)':'var(--danger)'}">${fmtMoney(entradas-saidas)}</div></div>
      </div>
      <div class="card"><div class="card-header"><div class="card-title">Movimentações de Hoje</div></div>
      <div class="card-body no-pad"><div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Descrição</th><th>Cliente/Forn.</th><th>Tipo</th><th class="num">Valor</th></tr></thead>
        <tbody>${mov.length?mov.map(m=>`<tr>
          <td>${m.descricao||'—'}</td>
          <td>${m.clientes?.nome||m.fornecedor||'—'}</td>
          <td><span class="badge ${m.tipo==='receber'?'badge-success':'badge-danger'}">${m.tipo==='receber'?'Entrada':'Saída'}</span></td>
          <td class="num"><b style="color:${m.tipo==='receber'?'var(--success)':'var(--danger)'}">${m.tipo==='receber'?'+':'-'}${fmtMoney(m.valor)}</b></td>
        </tr>`).join(''):`<tr><td colspan="4"><div class="empty">Sem movimentações hoje</div></td></tr>`}</tbody>
      </table></div></div></div>`;
  }catch(e){document.getElementById('content').innerHTML=`<div class="empty"><h3>${e.message}</h3></div>`;}
}

// ══════════════════════════════════════════════════════════
// RELATÓRIOS
// ══════════════════════════════════════════════════════════
async function pgRelatorios(){
  setPage('Relatórios','');
  document.getElementById('content').innerHTML=`<div class="empty"><div class="spin"></div></div>`;
  try{
    const [orc,os,fin]=await Promise.all([
      SB.get('orcamentos?select=*&order=created_at.desc&limit=500'),
      SB.get('ordens_servico?select=*&order=created_at.desc&limit=500'),
      SB.get('financeiro?select=*&limit=500'),
    ]);
    const fat=orc.filter(o=>o.status==='fechado').reduce((s,o)=>s+(Number(o.valor_total)||0),0);
    const area=orc.filter(o=>o.status==='fechado').reduce((s,o)=>s+(Number(o.area_m2)||0),0);
    const rec=fin.filter(f=>f.tipo==='receber'&&f.pago).reduce((s,f)=>s+(Number(f.valor)||0),0);
    document.getElementById('content').innerHTML=`
      <div class="grid-4 mb-md">
        <div class="kpi"><div class="kpi-label">Total Orçamentos</div><div class="kpi-value">${orc.length}</div></div>
        <div class="kpi"><div class="kpi-label">Fechados</div><div class="kpi-value" style="color:var(--success)">${orc.filter(o=>o.status==='fechado').length}</div></div>
        <div class="kpi"><div class="kpi-label">Faturamento Total</div><div class="kpi-value" style="color:var(--primary);font-size:18px">${fmtMoney(fat)}</div></div>
        <div class="kpi"><div class="kpi-label">Área Vendida (m²)</div><div class="kpi-value">${fmtNum(area)}</div></div>
      </div>
      <div class="grid-2">
        <div class="card"><div class="card-header"><div class="card-title">Orçamentos por Ambiente</div></div><div class="card-body">
          ${[...new Set(orc.map(o=>o.tipo_ambiente).filter(Boolean))].map(amb=>{
            const qtd=orc.filter(o=>o.tipo_ambiente===amb).length;
            const val=orc.filter(o=>o.tipo_ambiente===amb).reduce((s,o)=>s+(Number(o.valor_total)||0),0);
            return`<div class="flex flex-between items-center mb-sm">
              <span style="font-size:13px">${amb}</span>
              <div style="display:flex;gap:12px;font-size:13px">
                <span class="badge badge-info">${qtd}</span>
                <b>${fmtMoney(val)}</b>
              </div></div>`;}).join('')||'<div class="empty">Sem dados</div>'}
        </div></div>
        <div class="card"><div class="card-header"><div class="card-title">Recebimentos</div></div><div class="card-body">
          <div class="flex flex-between mb-sm"><span>Total recebido:</span><b style="color:var(--success)">${fmtMoney(rec)}</b></div>
          <div class="flex flex-between mb-sm"><span>OS finalizadas:</span><b>${os.filter(o=>o.status==='finalizado').length}</b></div>
          <div class="flex flex-between mb-sm"><span>OS em andamento:</span><b style="color:var(--primary)">${os.filter(o=>!['finalizado','cancelado'].includes(o.status)).length}</b></div>
        </div></div>
      </div>`;
  }catch(e){document.getElementById('content').innerHTML=`<div class="empty"><h3>${e.message}</h3></div>`;}
}

function pgConfig(){
  setPage('Configurações','');
  document.getElementById('content').innerHTML=`

      <button class="btn btn-primary btn-sm mb-sm" onclick="copiarSQL()">📋 Copiar SQL</button>
      <pre id="sql_block" style="background:#0f172a;color:#e2e8f0;padding:16px;border-radius:10px;font-size:11px;overflow:auto;max-height:400px;white-space:pre-wrap">${SQL_SETUP}</pre>
    </div></div>
    <div class="card"><div class="card-header"><div class="card-title">⚙️ Sobre o Sistema</div></div>

      <div class="flex flex-between mb-sm"><span>Supabase:</span><b style="color:var(--success)">Conectado</b></div>
    </div></div>`;
}

const SQL_SETUP=`-- GranfortSystem — Criar Tabelas
-- Execute no SQL Editor do Supabase

create table if not exists clientes(
  id text primary key, nome text not null, cpf_cnpj text,
  telefone text, email text, endereco text, cidade text,
  tipo text default 'Pessoa Física', observacoes text,
  created_at timestamptz default now()
);

create table if not exists materiais(
  id text primary key, nome text not null, tipo text default 'pedra',
  espessura text, preco_custo_m2 numeric default 0,
  preco_venda_m2 numeric default 0, observacoes text,
  created_at timestamptz default now()
);

create table if not exists chapas(
  id text primary key, numero text, material text, comp_cm numeric,
  larg_cm numeric, area_total_m2 numeric, area_disponivel_m2 numeric,
  fornecedor text, custo numeric default 0,
  status text default 'disponível', created_at timestamptz default now()
);

create table if not exists orcamentos(
  id text primary key, numero text, cliente_id text references clientes(id),
  tipo_ambiente text, material text, espessura text,
  comprimento_cm numeric, largura_cm numeric, area_m2 numeric,
  preco_m2 numeric, tem_saia boolean default false,
  tem_rodabanca boolean default false, tem_cuba boolean default false,
  qtd_furos int default 0, valor_instalacao numeric default 0,
  valor_deslocamento numeric default 0, valor_total numeric default 0,
  observacoes text, status text default 'aberto',
  created_at timestamptz default now()
);

create table if not exists ordens_servico(
  id text primary key, numero text, orcamento_id text,
  cliente_id text references clientes(id),
  tipo_ambiente text, material text, status text default 'medição',
  prazo_entrega date, observacoes text,
  created_at timestamptz default now()
);

create table if not exists agenda(
  id text primary key, cliente_id text references clientes(id),
  data_hora timestamptz, tipo text default 'Medição',
  endereco text, responsavel text, observacoes text,
  created_at timestamptz default now()
);

create table if not exists financeiro(
  id text primary key, tipo text not null,
  descricao text, cliente_id text references clientes(id),
  fornecedor text, valor numeric default 0,
  data_vencimento date, data_pagamento date,
  pago boolean default false, created_at timestamptz default now()
);

-- Ativar RLS (segurança)
alter table clientes enable row level security;
alter table materiais enable row level security;
alter table chapas enable row level security;
alter table orcamentos enable row level security;
alter table ordens_servico enable row level security;
alter table agenda enable row level security;
alter table financeiro enable row level security;

-- Política: acesso total (ajuste conforme necessário)
create policy "acesso_total" on clientes for all using (true) with check (true);
create policy "acesso_total" on materiais for all using (true) with check (true);
create policy "acesso_total" on chapas for all using (true) with check (true);
create policy "acesso_total" on orcamentos for all using (true) with check (true);
create policy "acesso_total" on ordens_servico for all using (true) with check (true);
create policy "acesso_total" on agenda for all using (true) with check (true);
create policy "acesso_total" on financeiro for all using (true) with check (true);`;

function copiarSQL(){
  navigator.clipboard.writeText(SQL_SETUP).then(()=>toast('SQL copiado!','success'));
}
